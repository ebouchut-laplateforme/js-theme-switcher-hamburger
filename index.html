<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Web Interface with JavaScript</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
  </head>

  <body class="page">
    <a class="skip-link" href="#main-content">Go to the main content</a>

    <header class="header">

      <nav class="nav" aria-label="Theme selection">
        <button class="nav__toggle" type="button"
                aria-expanded="false" aria-controls="menu-themes">
          <span class="nav__toggle-icon" aria-hidden="true">☰</span>
          Menu
        </button>

        <ul class="nav__list" id="menu-themes">
          <li class="nav__item">
            <button class="nav__button" type="button"
                    data-theme="dark" aria-pressed="false">
              Dark Mode
            </button>
          </li>
          <li class="nav__item">
            <button class="nav__button" type="button"
                    data-theme="light" aria-pressed="true">
              Light Mode
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main" id="main-content">
      <h1 class="main__title">Dynamic Web Interface with JavaScript</h1>

      <section class="hero">
        <h2 class="hero__title">Change the theme, and the page will change too!</h2>

        <p class="hero__text">
          The theme and image switch are driven by Javascript.
        </p>

        <button class="button" type="button" id="theme-toggle">
          Toggle the theme
        </button>
      </section>

      <figure class="theme-figure">
        <img class="theme-figure__image" id="theme-illustration"
             src="img/theme-light.svg"
             alt="Sunny beach with a palm tree."
             width="500" height="350">
        <figcaption class="theme-figure__caption">
          The image changes based on the theme selected from the hamburger menu.
        </figcaption>
      </figure>
    </main>

    <footer class="footer">
      <p class="footer__text">
        Dynamic Web Interface with JavaScript (hamburger menu, CSS media-queries).
      </p>
    </footer>
  </body>
</html>
